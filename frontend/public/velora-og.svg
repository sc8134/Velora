<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="vG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ambient blobs -->
    <radialGradient id="blob1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="200" rx="350" ry="300" fill="url(#blob1)"/>
  <ellipse cx="1050" cy="480" rx="300" ry="250" fill="url(#blob2)"/>

  <!-- Icon (scaled up, centered left) -->
  <g transform="translate(120, 115) scale(4)">
    <rect x="4" y="4" width="92" height="92" rx="22" fill="#0f0a1e"
          stroke="url(#vG)" stroke-width="1.5" opacity="0.95"/>
    <path d="M18 22 L50 72" stroke="url(#vG)" stroke-width="11"
          stroke-linecap="round" filter="url(#glow)"/>
    <path d="M82 22 L50 72" stroke="url(#vG)" stroke-width="11"
          stroke-linecap="round" filter="url(#glow)"/>
    <line x1="50" y1="72" x2="50" y2="84" stroke="#c084fc" stroke-width="4" stroke-linecap="round"/>
    <polyline points="43,79 50,87 57,79" stroke="#c084fc" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="620" y="340" font-family="system-ui, -apple-system, sans-serif"
        font-size="160" font-weight="900" letter-spacing="-4"
        fill="url(#textG)" text-anchor="middle">Velora</text>

  <!-- Tagline -->
  <text x="620" y="410" font-family="system-ui, -apple-system, sans-serif"
        font-size="32" font-weight="400" letter-spacing="6"
        fill="#ffffff" opacity="0.35" text-anchor="middle">
    DOWNLOAD ANY VIDEO OR AUDIO
  </text>
</svg>
