<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Main gradient: violet → indigo -->
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="#0f0a1e" stroke="url(#vGrad)" stroke-width="1.5" opacity="0.95"/>

  <!-- Subtle inner glow ring -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>

  <!-- V shape — two thick angled strokes meeting at a point -->
  <!-- Left arm of V -->
  <path d="M18 22 L50 72" stroke="url(#vGrad)" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Right arm of V -->
  <path d="M82 22 L50 72" stroke="url(#vGrad)" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Download arrow integrated at the bottom of the V -->
  <!-- Arrow stem -->
  <line x1="50" y1="72" x2="50" y2="84"
        stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="43,79 50,87 57,79"
            stroke="url(#arrowGrad)" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Decorative tech dots — top corners -->
  <circle cx="22" cy="18" r="2" fill="#a855f7" opacity="0.6"/>
  <circle cx="78" cy="18" r="2" fill="#6366f1" opacity="0.6"/>

  <!-- Thin horizontal speed line under the V arms (techy accent) -->
  <line x1="14" y1="28" x2="24" y2="28"
        stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="76" y1="28" x2="86" y2="28"
        stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
