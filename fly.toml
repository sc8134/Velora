# Fly.io configuration for Velora backend
# Deploy with: fly deploy

app = "velora-api"          # ← change to your preferred app name (must be unique on Fly)
primary_region = "sin"      # Singapore — closest to Nepal. Other options: lax, iad, fra, nrt

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = false   # keep always-on (no cold starts)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"   # free tier eligible
  memory = "512mb"

# Persistent volume — stores users.json and audit log
[[mounts]]
  source      = "velora_data"
  destination = "/data"

[env]
  VELORA_DATA_DIR = "/data"
  # Set secrets via: fly secrets set VELORA_SECRET=xxx FRONTEND_URL=xxx
