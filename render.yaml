services:
  # ── Backend (Python / FastAPI) ─────────────────────────────────────────────
  - type: web
    name: velora-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VELORA_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: FRONTEND_URL
        value: https://velora.yourdomain.com   # ← change to your domain
      - key: GOOGLE_REDIRECT_URI
        value: https://velora-api.yourdomain.com/api/auth/google/callback
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: velora-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_BASE_URL
        value: https://velora.yourdomain.com   # ← change to your domain
      - key: NODE_VERSION
        value: "20.11.0"
    plan: free
